name: Walkie
options:
  bundleIdPrefix: cc.walkie
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
targets:
  Walkie:
    type: application
    platform: iOS
    sources:
      - path: Walkie/Sources
      - path: Walkie/Resources
    settings:
      base:
        INFOPLIST_FILE: Walkie/Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: cc.walkie.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationPortrait"
schemes:
  Walkie:
    build:
      targets:
        Walkie: all
    run:
      config: Debug
